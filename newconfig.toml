api_key = "***MASKED***"
default_provider = "gemini"
default_model = "gemini-2.0-flash"
default_temperature = 0.7
provider_timeout_secs = 120
embedding_routes = []

# ================= PROVIDERS =================
[model_providers]

[model_providers.openrouter]
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"

[model_providers.gemini]
base_url = "https://generativelanguage.googleapis.com/v1beta"
api_key_env = "GEMINI_API_KEY"

[model_providers.nvidia]
base_url = "https://integrate.api.nvidia.com/v1"
api_key_env = "NVIDIA_API_KEY"

[model_providers.cloudflare]
base_url = "https://api.cloudflare.com/client/v4/accounts"
api_key_env = "CLOUDFLARE_API_KEY"

# ================= HEADERS =================
[extra_headers]

[extra_headers.openrouter]
HTTP-Referer = "https://iz.life"
X-Title = "ZeroClaw"

# ================= OBS =================
[observability]
backend = "none"
runtime_trace_mode = "none"
runtime_trace_path = "state/runtime-trace.jsonl"
runtime_trace_max_entries = 200

# ================= AUTONOMY =================
[autonomy]
level = "full"
workspace_only = true
allowed_commands = [ "git", "npm", "cargo", "ls", "cat", "grep", "find", "echo", "pwd", "wc", "head", "tail", "date", "python", "python3", "pip", "node" ]
forbidden_paths = [ "/etc", "/root", "/home", "/usr", "/bin", "/sbin", "/lib", "/opt", "/boot", "/dev", "/proc", "/sys", "/var", "/tmp", "~/.ssh", "~/.gnupg", "~/.aws", "~/.config" ]
max_actions_per_hour = 20
max_cost_per_day_cents = 500
require_approval_for_medium_risk = false
block_high_risk_commands = false
shell_env_passthrough = []

auto_approve = [
  "file_read",
  "file_write",
  "shell",
  "memory_recall",
  "web_search_tool",
  "web_fetch",
  "browser",
  "browser_open"
]

always_ask = []
allowed_roots = []
non_cli_excluded_tools = []
shell_timeout_secs = 60

# ================= RELIABILITY =================
[reliability]
provider_retries = 2
provider_backoff_ms = 800
fallback_providers = ["gemini", "openrouter", "nvidia"]
api_keys = []
channel_initial_backoff_secs = 2
channel_max_backoff_secs = 60
scheduler_poll_secs = 15
scheduler_retries = 2

[reliability.model_fallbacks]

"gemini/gemini-2.0-flash" = [
  "gemini/gemini-2.0-flash-lite",
  "openrouter/qwen/qwen-2.5-coder-32b-instruct:free",
  "nvidia/moonshotai/kimi-k2.5"
]

"google/gemini-1.5-pro" = [
  "gemini/gemini-2.0-flash",
  "openrouter/qwen/qwen-2.5-coder-32b-instruct:free"
]

"openrouter/qwen/qwen-2.5-coder-32b-instruct:free" = [
  "nvidia/moonshotai/kimi-k2.5"
]

# ================= ROUTING =================
[[model_routes]]
hint = "planning"
provider = "gemini"
model = "gemini-1.5-pro"

[[model_routes]]
hint = "coding"
provider = "openrouter"
model = "qwen/qwen-2.5-coder-32b-instruct:free"

[[model_routes]]
hint = "analysis"
provider = "gemini"
model = "gemini-2.0-flash"

[[model_routes]]
hint = "creative"
provider = "gemini"
model = "gemma-2-27b-it"

[[model_routes]]
hint = "general"
provider = "gemini"
model = "gemini-2.0-flash-lite"

# ================= TELEGRAM =================
[channels_config]
cli = true
message_timeout_secs = 300
ack_reactions = true
show_tool_calls = true
session_persistence = true
session_backend = "sqlite"
session_ttl_hours = 0
debounce_ms = 0

[channels_config.telegram]
enabled = true
bot_token = "***MASKED***"
allowed_users = [ "975318323" ]
stream_mode = "off"
draft_update_interval_ms = 1000
interrupt_on_new_message = false
mention_only = false