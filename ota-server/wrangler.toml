name = "zeroclaw-ota-server"
main = "src/index.js"
compatibility_date = "2024-03-20"

# QUAN TRỌNG: Phải bật tính năng nodejs_compat để Worker hỗ trợ thư viện mã hoá "node:crypto"
compatibility_flags = ["nodejs_compat"]

# Nếu người dùng cấu hình domain riêng, bỏ các comment định tuyến sau:
# routes = [
#   { pattern = "ota.tradekiem.com/*", custom_domain = true }
# ]

[vars]
OTA_VERSION = "1.2.6"
TELEGRAM_IDS = "975318323, 7237066439"
# Secret keys ẩn trên Cloudflare Dashboard (Chỉ điền mẫu tại đây)
CF_AI_KEY = "cf_ai_token_xxxxx"
OPENROUTER_KEY = "sk-or-v1-xxxxxxxxxxxxxxxxx"
NVIDIA_NIM_KEY = "nvapi-xxxxxxxxxxxxxxxxx"
TUNNEL_TOKEN = "eyJhIj... (Dán token Cloudflare của Quản trị viên vào đây để auto-bind)"

# Liên kết CSDL thiết bị
[[kv_namespaces]]
binding = "KV_DEVICES"
id = "<THAY_THE_BANG_KV_ID_CUA_BAN>"
