<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroClaw-Android — Admin Panel</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; padding: 2rem; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 2rem; color: #38bdf8; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .card { background-color: #1e293b; padding: 1.5rem; border-radius: 0.75rem; border: 1px solid #334155; }
        .card-title { font-size: 0.875rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; margin-bottom: 1rem; }
        .card-value { font-size: 1.25rem; font-weight: 700; color: #f8fafc; }
        .card-status { display: inline-block; padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; font-weight: 600; }
        .status-running { background-color: #065f46; color: #34d399; }
        .status-stopped { background-color: #7f1d1d; color: #f87171; }
    </style>
</head>
<body>
    <h1>🐾 ZeroClaw-Android: Admin Panel</h1>
    <div class="grid">
        <div class="card">
            <div class="card-title">System Uptime</div>
            <div id="uptime" class="card-value">--</div>
        </div>
        <div class="card">
            <div class="card-title">Memory (Used / Total)</div>
            <div id="memory" class="card-value">--</div>
        </div>
        <div class="card">
            <div class="card-title">SSHD Service</div>
            <div id="sshd" class="card-status">--</div>
        </div>
        <div class="card">
            <div class="card-title">Cloudflared Service</div>
            <div id="cloudflare" class="card-status">--</div>
        </div>
    </div>

    <script>
        const formatUptime = (seconds) => {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return `${h}h ${m}m`;
        };

        const updateStatus = async () => {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                document.getElementById('uptime').innerText = formatUptime(data.uptime);
                
                const totalMem = Math.round(data.totalMem / 1024 / 1024);
                const freeMem = Math.round(data.freeMem / 1024 / 1024);
                document.getElementById('memory').innerText = `${totalMem - freeMem}MB / ${totalMem}MB`;
                
                const sshd = document.getElementById('sshd');
                sshd.innerText = data.sshd ? 'RUNNING' : 'STOPPED';
                sshd.className = 'card-status ' + (data.sshd ? 'status-running' : 'status-stopped');

                const cloudflare = document.getElementById('cloudflare');
                cloudflare.innerText = data.cloudflared ? 'RUNNING' : 'STOPPED';
                cloudflare.className = 'card-status ' + (data.cloudflared ? 'status-running' : 'status-stopped');

            } catch (err) {
                console.error('Failed to fetch status:', err);
            }
        };

        updateStatus();
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
