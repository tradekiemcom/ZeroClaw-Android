<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroClaw — Admin Dashboard</title>
    <meta name="description" content="ZeroClaw Android Agent Administration Panel">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ── Login Screen ──────────────────────────────── -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="login-logo">
                <div class="logo-icon">🐾</div>
                <h1>ZeroClaw</h1>
                <p class="login-subtitle">Android Agent Command Center</p>
            </div>
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" autocomplete="username" required placeholder="admin">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••">
                </div>
                <div id="login-error" class="error-message hidden"></div>
                <button type="submit" id="login-btn" class="btn btn-primary btn-full">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader hidden">●●●</span>
                </button>
            </form>
        </div>
    </div>

    <!-- ── Dashboard Screen ──────────────────────────── -->
    <div id="dashboard-screen" class="screen">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <span class="header-logo">🐾</span>
                <h1 class="header-title">ZeroClaw</h1>
                <span class="header-badge" id="connection-badge">● Connected</span>
            </div>
            <div class="header-right">
                <button id="settings-btn" class="btn btn-ghost" title="Settings">⚙</button>
                <button id="logout-btn" class="btn btn-ghost" title="Logout">⏻</button>
            </div>
        </header>

        <!-- Status Cards -->
        <main class="dashboard-main">
            <section class="status-grid">
                <div class="card card-uptime">
                    <div class="card-icon">⏱</div>
                    <div class="card-content">
                        <div class="card-label">Uptime</div>
                        <div class="card-value" id="stat-uptime">—</div>
                    </div>
                </div>
                <div class="card card-memory">
                    <div class="card-icon">🧠</div>
                    <div class="card-content">
                        <div class="card-label">Memory</div>
                        <div class="card-value" id="stat-memory">—</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="memory-bar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <div class="card card-cpu">
                    <div class="card-icon">⚡</div>
                    <div class="card-content">
                        <div class="card-label">CPU Load</div>
                        <div class="card-value" id="stat-cpu">—</div>
                    </div>
                </div>
                <div class="card card-platform">
                    <div class="card-icon">📱</div>
                    <div class="card-content">
                        <div class="card-label">Platform</div>
                        <div class="card-value card-value-sm" id="stat-platform">—</div>
                    </div>
                </div>
            </section>

            <!-- Services -->
            <section class="section">
                <h2 class="section-title">Services</h2>
                <div class="services-grid">
                    <div class="service-card" data-service="tunnel">
                        <div class="service-header">
                            <span class="service-indicator" id="svc-tunnel-indicator"></span>
                            <span class="service-name">Cloudflare Tunnel</span>
                            <span class="service-status" id="svc-tunnel-status">—</span>
                        </div>
                        <div class="service-actions">
                            <button class="btn btn-sm btn-success" onclick="serviceAction('tunnel','start')">Start</button>
                            <button class="btn btn-sm btn-danger" onclick="serviceAction('tunnel','stop')">Stop</button>
                            <button class="btn btn-sm btn-outline" onclick="serviceAction('tunnel','restart')">Restart</button>
                        </div>
                    </div>
                    <div class="service-card" data-service="sshd">
                        <div class="service-header">
                            <span class="service-indicator" id="svc-sshd-indicator"></span>
                            <span class="service-name">SSH Daemon</span>
                            <span class="service-status" id="svc-sshd-status">—</span>
                        </div>
                        <div class="service-actions">
                            <button class="btn btn-sm btn-success" onclick="serviceAction('sshd','start')">Start</button>
                            <button class="btn btn-sm btn-danger" onclick="serviceAction('sshd','stop')">Stop</button>
                            <button class="btn btn-sm btn-outline" onclick="serviceAction('sshd','restart')">Restart</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Logs -->
            <section class="section">
                <h2 class="section-title">Logs</h2>
                <div class="log-controls">
                    <select id="log-select" class="select">
                        <option value="boot">Boot Log</option>
                        <option value="tunnel">Tunnel Log</option>
                        <option value="dashboard">Dashboard Log</option>
                    </select>
                    <button class="btn btn-sm btn-outline" onclick="loadLogs()">Refresh</button>
                </div>
                <div class="log-viewer" id="log-viewer">
                    <pre id="log-content">Select a log and click Refresh...</pre>
                </div>
            </section>
        </main>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-backdrop" onclick="closeSettings()"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <button class="btn btn-ghost" onclick="closeSettings()">✕</button>
                </div>
                <div class="modal-body">
                    <h3>Change Password</h3>
                    <form id="password-form">
                        <div class="form-group">
                            <label for="current-pw">Current Password</label>
                            <input type="password" id="current-pw" required>
                        </div>
                        <div class="form-group">
                            <label for="new-pw">New Password</label>
                            <input type="password" id="new-pw" required minlength="8" placeholder="Minimum 8 characters">
                        </div>
                        <div class="form-group">
                            <label for="confirm-pw">Confirm New Password</label>
                            <input type="password" id="confirm-pw" required minlength="8">
                        </div>
                        <div id="pw-error" class="error-message hidden"></div>
                        <div id="pw-success" class="success-message hidden"></div>
                        <button type="submit" class="btn btn-primary">Update Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
