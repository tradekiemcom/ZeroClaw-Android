# ============================================================
# ZeroClaw Cloudflare Tunnel Configuration
# Domain: your-configured-domain.com → localhost:7643
# ============================================================

# Tunnel will use token-based authentication (no cert needed)
# Start with: cloudflared tunnel --no-autoupdate run --token $TUNNEL_TOKEN

# This config is used when running with: cloudflared --config config.yml
# For token-based tunnels, the dashboard-side config overrides ingress.
# Keep this as the local reference and for named-tunnel fallback.

tunnel: zeroclaw
credentials-file: /data/data/com.termux/files/home/.cloudflared/credentials.json

originRequest:
  # Validate Host header to prevent host-header attacks
  httpHostHeader: "your-configured-domain.com"
  # No TLS to localhost (dashboard is HTTP)
  noTLSVerify: true
  # Connection timeouts
  connectTimeout: 30s
  # Keep-alive
  keepAliveTimeout: 90s
  # HTTP/2 support
  http2Origin: true

ingress:
  # Dashboard — primary route
  - hostname: your-configured-domain.com
    service: http://localhost:7643
    originRequest:
      # CORS: restrict to domain only
      httpHostHeader: "your-configured-domain.com"

  # Catch-all: reject unmatched requests
  - service: http_status:404
